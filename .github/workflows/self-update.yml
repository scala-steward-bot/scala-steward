on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '5 2 * * *'
concurrency: self-update
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.repository_owner == 'scala-steward-bot' }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: 21
        distribution: temurin
    - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
    - id: generate_token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: 89536
        private-key: ${{ secrets.XUWEI_K_BOT_KEY }}
    - uses: coursier/coursier-setup@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
    - run: cs install scalafmt
    - run: cs install scalafix
    - run: GITHUB_TOKEN="${{ steps.generate_token.outputs.token }}" sbt -v selfUpdate
