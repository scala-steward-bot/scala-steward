on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '5 2 * * *'
concurrency: self-update
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.repository_owner == 'scala-steward-bot' }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: 21
        distribution: temurin
    - uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1
    - id: generate_token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: 89536
        private-key: ${{ secrets.XUWEI_K_BOT_KEY }}
    - uses: coursier/coursier-setup@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
    - run: cs install scalafmt
    - run: cs install scalafix
    - run: GITHUB_TOKEN="${{ steps.generate_token.outputs.token }}" sbt -v selfUpdate
