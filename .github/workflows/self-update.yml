on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '5 2 * * *'
concurrency: self-update
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.repository_owner == 'scala-steward-bot' }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 21
        distribution: temurin
    - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23
    - id: generate_token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        client-id: 89536
        private-key: ${{ secrets.XUWEI_K_BOT_KEY }}
    - uses: coursier/coursier-setup@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
    - run: cs install scalafmt
    - run: cs install scalafix
    - run: GITHUB_TOKEN="${{ steps.generate_token.outputs.token }}" sbt -v selfUpdate
