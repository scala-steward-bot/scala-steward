on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '10 */2 * * *'
concurrency: steward
jobs:
  scala-steward:
    strategy:
      fail-fast: false
      matrix:
        index: [0, 1, 2, 3, 4]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.repository_owner == 'scala-steward-bot' }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: 21
        distribution: temurin
    - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0
    - run: echo "${{ secrets.APP_PRIVATE_KEY }}" > key.pem
    - run: sbt -v "runMain scala_steward_bot.GetReposFromGitHubApp ${{ matrix.index }} 5"
    - run: rm key.pem
    - run: git diff
    - run: cat repos.md
    - uses: scala-steward-org/scala-steward-action@ff09222640622d474d0d9f93c04aefedd125b187 # v2.92.0
      env:
        JAVA_OPTS: "-Xmx5G"
      with:
        cache-ttl: "0s"
        author-email: "2517319+scala-steward-bot@users.noreply.github.com"
        author-name: "scala-steward-bot"
        github-token: ${{ secrets.MY_GITHUB_TOKEN }}
        repos-file: "repos.md"
        do-not-fork: "false"
