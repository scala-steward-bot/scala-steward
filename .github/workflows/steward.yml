on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '10 */2 * * *'
concurrency: steward
jobs:
  scala-steward:
    strategy:
      fail-fast: false
      matrix:
        index: [0, 1, 2]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.repository_owner == 'scala-steward-bot' }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: 21
        distribution: temurin
    - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
    - run: echo "${{ secrets.APP_PRIVATE_KEY }}" > key.pem
    - run: sbt -v "runMain scala_steward_bot.GetReposFromGitHubApp ${{ matrix.index }} 3"
    - run: rm key.pem
    - run: git diff
    - run: cat repos.md
    - uses: scala-steward-org/scala-steward-action@ff09222640622d474d0d9f93c04aefedd125b187 # v2.92.0
      env:
        JAVA_OPTS: "-Xmx5G"
      with:
        cache-ttl: "0s"
        author-email: "2517319+scala-steward-bot@users.noreply.github.com"
        author-name: "scala-steward-bot"
        github-token: ${{ secrets.MY_GITHUB_TOKEN }}
        repos-file: "repos.md"
        do-not-fork: "false"
