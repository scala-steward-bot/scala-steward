on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '10 */2 * * *'
concurrency: steward
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.repository_owner == 'scala-steward-bot' }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 21
        distribution: temurin
    - uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1
    - run: echo "${{ secrets.APP_PRIVATE_KEY }}" > key.pem
    - run: sbt -v "runMain scala_steward_bot.GetReposFromGitHubApp"
    - run: rm key.pem
    - run: git diff
    - run: cat repos.md
    - uses: scala-steward-org/scala-steward-action@708c1d682b14b9785201afb25c8ffece0a9d126f # v2.90.0
      env:
        JAVA_OPTS: "-Xmx5G"
      with:
        cache-ttl: "0s"
        author-email: "2517319+scala-steward-bot@users.noreply.github.com"
        author-name: "scala-steward-bot"
        github-token: ${{ secrets.MY_GITHUB_TOKEN }}
        repos-file: "repos.md"
        do-not-fork: "false"
